<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pulse Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
   <a href="https://www.pulse-player.tv">Website</a>
 </nav>
  <div id="app"></div>
  <script>

  window.platformIds = {
    "0": {
      name: "Android",
      color: "#78C257",
      icon: `<svg viewBox="0 0 512 512"><path d="M380.91 199l42.47-73.57a8.63 8.63 0 00-3.12-11.76 8.52 8.52 0 00-11.71 3.12l-43 74.52c-32.83-15-69.78-23.35-109.52-23.35s-76.69 8.36-109.52 23.35l-43-74.52a8.6 8.6 0 10-14.88 8.64L131 199C57.8 238.64 8.19 312.77 0 399.55h512c-8.19-86.78-57.8-160.91-131.09-200.55zM138.45 327.65a21.46 21.46 0 1121.46-21.46 21.47 21.47 0 01-21.46 21.46zm235 0A21.46 21.46 0 11395 306.19a21.47 21.47 0 01-21.51 21.46z"/></svg>`
    },
    "1": {
      name: "Windows",
      color: "#00A4EF",
      icon: `<svg viewBox="0 0 512 512"><path d="M480 265H232v179l248 36V265zM216 265H32v150l184 26.7V265zM480 32L232 67.4V249h248V32zM216 69.7L32 96v153h184V69.7z"/></svg>`
    }
  }

  function renderSupportTable(platforms){
    if(platforms[0] === "JSAPI"){
      return `<div class='supportTable full'><div class="supported vert"><b>Platform Independent</b></div></div>`
    }
    if(platforms[0] === "JSAPIDIFF"){
      return `<div class='supportTable full'><div class="supported vert"><b>Platform Independent</b></div><div class="supported vert blue"><b>Different Results</b></div></div>`
    }
    if(platforms[0] === "JSAPIACTION"){
      return `<div class='supportTable full'><div class="supported vert"><b>Platform Independent</b></div><div class="supported vert violet"><b>Different Action</b></div></div>`
    }
    var content = ""
    var count = 0;
    for(var key in window.platformIds){
      content += `<div class="${(platforms[0] === "*" || platforms.includes(key)) ? "supported" : ""}" style="--svg-color: ${window.platformIds[key].color}"><span>${window.platformIds[key].name}</span>${window.platformIds[key].icon}</div>`
      if(platforms.includes(key)){
        count++;
      }
    }
    if(count == Object.keys(window.platformIds).length || platforms[0] === "*"){
      return "<div class='supportTable full'>" + content + "</div>"
    }
    return "<div class='supportTable'>" + content + "</div>"

  }

  function stringToHTML(htmlString) {
    var div = document.createElement('div');
    div.innerHTML = htmlString.trim();
    return div.firstChild;
  }

  window.$docsify = {
    name: 'Pulse Documentation',
    repo: 'PulseMedia/Pulse',
    homepage: "index.md",
    loadSidebar: true,
    subMaxLevel: 0,
    auto2top: true,
	  sidebarDisplayLevel: 1,
    plugins: [
      function(hook, vm) {
        hook.init(function() {
        });

        hook.beforeEach(function(content) {
          return content.replace(/\[Supports\(([0-9,*]*)\)\]/gm, (key, occur) => {
            return renderSupportTable(occur.split(",").map(e => e.trim()));
          }).replace(/\[Supports\(JSAPI\)\]/gm, (key, occur) => {
            return renderSupportTable([ "JSAPI" ]);
          }).replace(/\[Supports\(JSAPIDIFF\)\]/gm, (key, occur) => {
            return renderSupportTable([ "JSAPIDIFF" ]);
          }).replace(/\[Supports\(JSAPIACTION\)\]/gm, (key, occur) => {
            return renderSupportTable([ "JSAPIACTION" ]);
          }).replaceAll("[Function]", `<div class="function">`)
            .replaceAll("[/Function]", `</div>`)
            .replaceAll("[Property]", `<div class="function property">`)
            .replaceAll("[/Property]", `</div>`)
            .replaceAll("[Serve]", `<div class="function serve">`)
            .replaceAll("[/Serve]", `</div>`)
            .replaceAll("[RepresentationClass]", `<hr><div class="repclass"><h1><a class="anchor"><span>Representation Class</span></a></h1>`)
            .replaceAll("[/RepresentationClass]", `</div>`)
            .replaceAll("[Class]", `<hr><div class="class">`)
            .replaceAll("[/Class]", `</div>`);
        });

        hook.afterEach(function(html, next) {
          if(html.includes("<p>[ContentTable]</p>")){
            var asHtml = stringToHTML(`<div class="generated">${html}</div>`);

            var titleApiRoute = ""
            try {
              titleApiRoute = asHtml.querySelectorAll("div.generated > h1 > a > span")[0].innerText + ".";
            } catch (e) {}

            var contentTableHTML = `<hr><h3 id="file-api"><a class="anchor"><span>Table of Contents</span></a></h3>`

            var funcTable = "";

            var staticFuncs = asHtml.querySelectorAll("div.generated > div.function");

            for (let i = 0; i < staticFuncs.length; i++) {
              let func = staticFuncs[i];
              let mode = "FUNCTION";
              let tag = func.querySelectorAll("p > em");

              if(tag.length > 0){
                mode = tag[0].innerText.toUpperCase();
              }

              let tagContent = "";
              let title = func.querySelectorAll("h2 > a")[0];
              let returnVal = `<span style="color: #81a1eb">undefined</span> : `;
              try {
                let returns = func.querySelectorAll("h3 + blockquote");
                for(var x = 0; x < returns.length; x++){
                  if(returns[x].previousElementSibling.id.includes("returns")){
                    returnVal = `<span style="color: #81a1eb">` + returns[x].firstElementChild.firstChild.nodeValue.trim() + `</span> : `;
                    break;
                  }
                }
              } catch (e) {}
              let multiArgs = false;
              try {
                if(title.innerText.split("(")[1].trim().length > 2){
                  multiArgs = true;
                }
              } catch (e) {}

              let funcPath = "";
              if(mode == "PROPERTY"){
                funcPath = titleApiRoute + title.innerText.split("(")[0] + ";";

                funcTable += `<tr><td><b class="mathItalicChar">𝑝</b><a href="${title.hash}" style="color: #ab7512;">${title.innerText.split("(")[0]}</a></td><td><span style="font-size: 15px; opacity: 0.75;">${returnVal}<code style="color: #939393;">${funcPath}</code></span></td></tr>`
              } else {
                funcPath = titleApiRoute + title.innerText.split("(")[0] + `(${multiArgs ? "..." : ""});`;

                funcTable += `<tr><td><b class="mathItalicChar">𝑓</b><a href="${title.hash}">${title.innerText.split("(")[0]}</a></td><td><span style="font-size: 15px; opacity: 0.75;">${returnVal}<code style="color: #939393;">${funcPath}</code></span></td></tr>`
              }
            }
            if(funcTable.length > 0){
              contentTableHTML += `<table><thead><tr><th>Static</th><th></th></tr></thead><tbody>`
              contentTableHTML += funcTable;
              contentTableHTML += `</tbody></table>`;
            }


            var classHeader = true;
            var classSets = false;
            var classFuncs = asHtml.querySelectorAll("div.generated > div.class");
            for (let i = 0; i < classFuncs.length; i++) {
              let classTable = "";
              let item = classFuncs[i];
              let title = "???";

              let tilteItems = item.querySelectorAll("h1 > a");
              if(tilteItems.length > 0){
                title = tilteItems[0].innerText;
              }

              var classInnerFuncs = item.querySelectorAll("div.function > h2 > a");
              for (let x = 0; x < classInnerFuncs.length; x++) {
                  let innerItem = classInnerFuncs[x];
                  let extraClass = "";
                  if(innerItem.parentElement.parentElement.classList.contains("property")){
                    extraClass += " property";
                  }

                  let funcPath = "";
                  funcPath = "CLASS." + innerItem.innerText.split("(")[0] + ";";

                  let multiArgs = false;
                  try {
                    if(innerItem.innerText.split("(")[1].trim().length > 2){
                      multiArgs = true;
                    }
                  } catch (e) {}

                  let returnVal = `<span style="color: #81a1eb">undefined</span> : `;
                  try {
                    let returns = innerItem.parentElement.parentElement.querySelectorAll("h3 + blockquote");
                    for(var y = 0; y < returns.length; y++){
                      if(returns[y].previousElementSibling.id.includes("returns")){
                        returnVal = `<span style="color: #81a1eb">` + returns[y].firstElementChild.firstChild.nodeValue.trim() + `</span> : `;
                        break;
                      }
                    }
                  } catch (e) {}

                  if(innerItem.innerText.split("(")[0].toUpperCase() == "CONSTRUCTOR"){
                    funcPath = "new "+ titleApiRoute + title + `(${multiArgs ? "..." : ""});`;
                    returnVal = `<span style="color: #42b3f5">${title}Class</span> : `
                    if(tilteItems.length > 0){
                      classTable += `<tr><td><a href="${tilteItems[0].hash}" class="TOCClassConstructor ${extraClass}"><strong class="tableType">${title}</strong></a><b class="mathItalicCharR">Constructor</b></td><td><span style="font-size: 15px; opacity: 0.75;">${returnVal}<code style="color: #939393;">${funcPath}</code></span></td></tr>`
                    } else {
                      classTable += `<tr><td><a href="${innerItem.hash}" class="TOCClassConstructor ${extraClass}"><strong class="tableType">${title}</strong></a><b class="mathItalicCharR">Constructor</b></td><td><span style="font-size: 15px; opacity: 0.75;">${returnVal}<code style="color: #939393;">${funcPath}</code></span></td></tr>`
                    }
                  } else {

                    if(innerItem.parentElement.parentElement.classList.contains("property")){
                      funcPath = title + "Class." + innerItem.innerText.split("(")[0] + ";";
                      classTable += `<tr><td><b class="mathItalicChar">- 𝑝</b><a href="${innerItem.hash}" class="TOCClassFunc ${extraClass}" style="color: #ab7512;">${innerItem.innerText.split("(")[0]}</a></td><td><span style="font-size: 15px; opacity: 0.75;">${returnVal}<code style="color: #939393;">${funcPath}</code></span></td></tr>`
                    } else {
                      funcPath = title + "Class." + innerItem.innerText.split("(")[0] + `(${multiArgs ? "..." : ""});`;
                      classTable += `<tr><td><b class="mathItalicChar">- 𝑓</b><a href="${innerItem.hash}" class="TOCClassFunc ${extraClass}">${innerItem.innerText.split("(")[0]}</a></td><td><span style="font-size: 15px; opacity: 0.75;">${returnVal}<code style="color: #939393;">${funcPath}</code></span></td></tr>`
                    }
                  }
              }

              if(classTable.length > 0){
                classSets = true;
                if(classHeader){
                  contentTableHTML += `<table><thead><tr><th>Classes</th><th></th></tr></thead><tbody>`
                  classHeader = false;
                }
                contentTableHTML += classTable;
              }

            }

            if(classSets){
              contentTableHTML += `</tbody></table>`;
            }



            var representationTable = "";

            var representationFuncs = asHtml.querySelectorAll("div.generated > div.repclass > div.function > h2 > a");
            for (let i = 0; i < representationFuncs.length; i++) {
              let item = representationFuncs[i];
              let extraClass = "";
              if(item.parentElement.parentElement.classList.contains("property")){
                extraClass += " property";
              }

              let funcPath = "";
              funcPath = "CLASS." + item.innerText.split("(")[0] + ";";

              let multiArgs = false;
              try {
                if(item.innerText.split("(")[1].trim().length > 2){
                  multiArgs = true;
                }
              } catch (e) {}

              let className = titleApiRoute.slice(0, -1).split(".").pop() + "Class";
              let classPure = titleApiRoute.slice(0, -1).split(".").pop();
              let returnVal = "";
              if(item.innerText.split("(")[0].toUpperCase() == "CONSTRUCTOR"){
                funcPath = "new "+ titleApiRoute.slice(0, -1) + `(${multiArgs ? "..." : ""});`;
                returnVal = `<span style="color: #42b3f5">${className}</span> : `
                representationTable += `<tr><td><a href="${item.hash}" class="TOCClassConstructor ${extraClass}"><strong class="tableType">Representation Class</strong></a><b class="mathItalicCharR">Constructor</b></td><td><span style="font-size: 15px; opacity: 0.75;">${returnVal}<code style="color: #939393;">${funcPath}</code></span></td></tr>`
              } else {
                if(item.parentElement.parentElement.classList.contains("property")){
                  funcPath = className + "." + item.innerText.split("(")[0] + ";";

                  try {
                    let returns = item.parentElement.parentElement.querySelectorAll("h3 + blockquote");
                    for(var y = 0; y < returns.length; y++){
                      if(returns[y].previousElementSibling.id.includes("returns")){
                        returnVal = `<span style="color: #81a1eb">` + returns[y].firstElementChild.firstChild.nodeValue.trim() + `</span> : `;
                        break;
                      }
                    }
                  } catch (e) {}

                  representationTable += `<tr><td><b class="mathItalicChar">- 𝑝</b><a href="${item.hash}" class="TOCClassFunc ${extraClass}" style="color: #ab7512;">${item.innerText.split("(")[0]}</a></td><td><span style="font-size: 15px; opacity: 0.75;">${returnVal}<code style="color: #939393;">${funcPath}</code></span></td></tr>`
                } else {
                  returnVal = " : "
                  funcPath = className + "." + item.innerText.split("(")[0] + `(${multiArgs ? "..." : ""});`;

                  try {
                    let returns = item.parentElement.parentElement.parentElement.parentElement.querySelectorAll("div.function > h2");
                    for(var y = 0; y < returns.length; y++){
                      if(returns[y].id.includes(item.innerText.split("(")[0].toLowerCase())){
                        let returnsx = returns[y].parentElement.querySelectorAll("h3 + blockquote");
                        for(var z = 0; z < returns.length; z++){
                          if(returnsx[z].previousElementSibling.id.startsWith("returns")){
                            returnVal = `<span style="color: #81a1eb">` + returnsx[z].firstElementChild.firstChild.nodeValue.trim() + `</span> : `;
                            break;
                          }
                        }
                        break;
                      }
                    }
                  } catch (e) {}

                  representationTable += `<tr><td><b class="mathItalicChar">- 𝑓</b><a href="${item.hash}" class="TOCClassFunc ${extraClass}">${item.innerText.split("(")[0]}</a></td><td><span style="font-size: 15px; opacity: 0.75;">${returnVal}<code style="color: #939393;">${funcPath}</code></span></td></tr>`
                }
              }
            }

            if(representationTable.length > 0){
              contentTableHTML += `<table><thead><tr><th>Representation Class</th><th></th></tr></thead><tbody>`
              contentTableHTML += representationTable;
              contentTableHTML += `</tbody></table>`;
            }

            html = html.replace("<p>[ContentTable]</p>", contentTableHTML + "<hr>");
          }
          next(html);
        });

        hook.doneEach(function() {
          var tags = document.querySelectorAll("div.function > p > em");
          for (let i = 0; i < tags.length; i++) {
            tags[i].setAttribute("tagContent", tags[i].innerText);
            tags[i].parentElement.parentElement.hasTypeTag = true;
            tags[i].parentElement.parentElement.typeTagName = tags[i].innerText;
          }

          var funcs = document.querySelectorAll("div.function");
          for (let i = 0; i < funcs.length; i++) {
            if(funcs[i].hasTypeTag !== true){
              let created = document.createElement("p");
              created.innerHTML = `<em tagcontent="Function">Function</em>`
              funcs[i].insertBefore(created, funcs[i].firstChild.nextElementSibling.nextElementSibling);
            } else {
              if(funcs[i].typeTagName == "Property"){
                let returnGetter = funcs[i].querySelectorAll("h3 + blockquote");
                for(var x = 0; x < returnGetter.length; x++){
                  if(returnGetter[x].previousElementSibling.id.includes("returns")){
                    returnGetter[x].previousElementSibling.innerHTML = "<b class='propTypeGet'>GETTER</b>" + returnGetter[x].previousElementSibling.innerHTML;
                  }
                  if(returnGetter[x].previousElementSibling.id.includes("set")){
                    returnGetter[x].previousElementSibling.innerHTML = "<b class='propTypeSet'>SETTER</b>" + returnGetter[x].previousElementSibling.innerHTML;
                  }
                }
              }
            }
          }
        });

        hook.mounted(function() {
        });

        hook.ready(function() {
        });
      }
    ]
  }
  </script>

  <script src="docsify.js"></script>
  <script src="sidebar-collapse.min.js"></script>
  <script src="prism-json.min.js"></script>
</body>
</html>
